  prefix: "&8[&6建筑彩票&8] &r"
  no-permission: "&c你没有权限。"
  player-only: "&c只有玩家可以使用这个命令。"
  player-not-found: "&c找不到这个玩家。"
  reload-success: "&a配置已重载。"
  menu-opened: "&a已打开彩票菜单。"
  target-menu-opened: "&a已为 &e%player% &a打开彩票菜单。"
  economy-unavailable: "&c彩票经济账户当前不可用，请联系管理员。"
  not-enough-money: "&c你的余额不足。"
  purchase-success: "&a已购买 &e%type% &a彩票。&7(%current%/%max%)"
  purchase-limit: "&c你已经达到本期购买上限。"
  email-invalid: "&c请输入有效邮箱或 QQ 号。"
  email-bound: "&a已绑定通知邮箱: &e%email%"
  email-unbound: "&a已解绑通知邮箱。"
  email-info: "&a当前通知邮箱: &e%email%"
