  - "&e/lottery draw <daily|weekly|holiday> &7- 手动开奖"
  - "&e/lottery preview <daily|weekly|holiday> &7- 预览当前期开奖状态"
  - "&e/lottery period <daily|weekly|holiday> &7- 查看当前期状态"
  - "&e/lottery pool add <daily|weekly|holiday> <金额> &7- 给当前期增加额外奖池"
