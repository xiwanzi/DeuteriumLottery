# lottery 插件主配置
# 插件名: lottery
# 作者: xiwanzi

# 配置迭代版本。插件会用它判断是否需要追加新版本配置，不会覆盖已有生产配置。
config-version: 2

settings:
  # 彩票资金账户。玩家购票时，100% 付款会先进入这个账户。
  # 退款和派奖时，也会先从这个账户扣除，再发给玩家。
  # 如果 XConomy 无法创建 lottery 账户，可以改成已有账户，例如 "TaX"。
  system-account: "lottery"

  # 菜单刷新间隔，单位 tick。20 tick = 1 秒。
  menu-refresh-ticks: 20

  # 自动开奖检查间隔，单位 tick。20 tick = 1 秒。
  draw-check-ticks: 20

  # true = 同一期同种彩票里，一个玩家最多中一个奖项。
  same-player-single-prize: true

  # 购买确认。false = 点击菜单彩票按钮后直接购买。
  purchase-confirm: false

  # 购买确认有效时间，单位秒。
  purchase-confirm-seconds: 10

daily:
  display-name: "&e每日彩票"
  price: 50
  max-purchases-per-player: 2
  min-total-pool: 200
  reward-pool-percent: 70
  house-pool-percent: 30

  schedules:
    fixed-daily:
      enabled: true
      time: "21:00"
    fixed-weekly:
      enabled: false
      day: "SUNDAY"
      time: "21:00"
    interval:
      enabled: false
      minutes: 10

  rewards:
    first:
      winners: 1
      pool-percent: 65
    second:
      winners: 1
      pool-percent: 25
    third:
      winners: 2
      pool-percent: 10

weekly:
  display-name: "&b每周彩票"
  price: 200
  max-purchases-per-player: 2
  min-total-pool: 1000
  reward-pool-percent: 70
  house-pool-percent: 30

  schedules:
    fixed-daily:
      enabled: false
      time: "21:00"
    fixed-weekly:
      enabled: true
      day: "SUNDAY"
      time: "21:30"
    interval:
      enabled: false
      minutes: 10

  rewards:
    first:
      winners: 1
      pool-percent: 60
    second:
      winners: 1
      pool-percent: 25
    third:
      winners: 2
      pool-percent: 15

holiday:
  display-name: "&6节日公益活动"
  # 是否开放活动。false 时菜单入口仍会展示，但玩家不能参与投注。
  enabled: false

  # 每个玩家每期最多可以参与几次分池。
  max-bets-per-player: 5

  # 可选投注额度。玩家在活动菜单里选择一个主题和一个额度参与。
  bet-amounts:
    - 100
    - 300
    - 600

  # 当前可分配给玩家的奖池低于该金额时，本期不会开奖并自动退款。
  min-total-pool: 1500

  # 进入玩家奖励池的比例。剩余部分会留在 settings.system-account 作为公益活动收益。
  reward-pool-percent: 90
  house-pool-percent: 10

  schedules:
    fixed-daily:
      enabled: true
      time: "22:00"
    fixed-weekly:
      enabled: false
      day: "SUNDAY"
      time: "22:00"
    interval:
      enabled: false
      minutes: 10

  # 节日公益活动采用玩家之间分池竞争：
  # 玩家选择红石/黑曜石/金块之一参与，开奖抽出一个结果。
  # 命中的玩家按自己在命中分池里的投注占比瓜分 reward-pool-percent 对应的奖池。
  # 如果抽中的结果无人命中，奖励池会滚入下一期，不会凭空增发货币。
  outcomes:
    redstone:
      display-name: "&c红石"
      material: "REDSTONE_BLOCK"
      chance-percent: 45
    obsidian:
      display-name: "&8黑曜石"
      material: "OBSIDIAN"
      chance-percent: 45
    gold:
      display-name: "&6金块"
      material: "GOLD_BLOCK"
      chance-percent: 10

mail:
  enabled: false
  smtp:
    host: "smtp.qq.com"
    port: 465
    ssl: true
    starttls: false
    username: "你的QQ号@qq.com"
    password: "你的SMTP授权码"
  sender:
    from: "你的QQ号@qq.com"
    name: "建筑彩票通知"
  templates:
    win-subject: "[建筑彩票] 恭喜您在服务器彩票中中奖！"
    win-body:
      - "尊敬的 %player%："
      - ""
      - "恭喜您在本期开奖中获得奖励！"
      - ""
      - "彩票类型：%lottery_type%"
      - "中奖奖项：%prize%"
      - "中奖金额：%amount%"
      - "开奖时间：%time%"
      - ""
      - "奖金已自动发放至您的游戏账户。"
      - "感谢您参与建筑彩票，祝您下次继续好运！"
      - ""
      - "建筑彩票系统"

broadcast:
  enabled: true
  empty: ""
  hide-empty-prize-lines: true
  lines:
    - "&8[&6建筑彩票&8] &e第 &f%period% &e期 %type% &e正式开奖！"
    - "&8[&6建筑彩票&8] &6一等奖得主: &f%first% &7今晚的幸运儿出现了！"
    - "&8[&6建筑彩票&8] &b二等奖得主: &f%second%"
    - "&8[&6建筑彩票&8] &a三等奖得主: &f%third%"
  canceled-lines:
    - "&8[&6建筑彩票&8] &e第 &f%period% &e期 %type% &7因奖池不足，本期未开奖。"
    - "&8[&6建筑彩票&8] &7当前奖池: &f%pool% &7/ 最低开奖: &f%min_pool% &7，已自动退款。"
  no-tickets-lines:
    - "&8[&6建筑彩票&8] &e第 &f%period% &e期 %type% &7因无人购票，本期未开奖。"
    - "&8[&6建筑彩票&8] &7当前奖池: &f%pool% &7，已进入下一期。"

reminder:
  enabled: true
  minutes:
    - 5
    - 1
  lines:
    - "&8[&6建筑彩票&8] &e%type% &7将在 &f%minutes% &7分钟后开奖！"
    - "&8[&6建筑彩票&8] &7当前奖池: &a%pool% &7/ 最低开奖: &f%min_pool%"
    - "&8[&6建筑彩票&8] &e想搏一搏手气的玩家，现在还来得及。"

# 高危功能区。reset 会清空指定彩票类型的插件记录，并重置为第 1 期。
# 该功能仍需要管理员权限，并且执行者 UUID 必须在 allowed-uuids 内。
# 注意：reset 不会修改 XConomy 里的 lottery/TaX 账户余额，避免误动其他税收资金。
danger-zone:
  reset:
    allowed-uuids: []

